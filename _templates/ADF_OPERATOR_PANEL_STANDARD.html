<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>ADF Operator Panel Standard — Reference Template v1.0</title>
  <!--
  ╔══════════════════════════════════════════════════════════════════╗
  ║  ADF_OPERATOR_PANEL_STANDARD.html                               ║
  ║  Aurora Digital Foundry — Internal Reference Template           ║
  ║  Version: 1.0 | Date: 2026-06-11                                ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  PURPOSE                                                        ║
  ║  Reference implementation of the 3 standard ADF operator        ║
  ║  panels that must appear in every operator suite:               ║
  ║    1. Marketing Generator                                       ║
  ║    2. AI Console                                                ║
  ║    3. Business Intelligence                                     ║
  ║                                                                 ║
  ║  These panels are the ADF ceiling demonstration. Their presence ║
  ║  in every build is non-negotiable.                              ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  USAGE                                                          ║
  ║  1. Locate all <!--[SWAP: ...]-->...<!--[/SWAP]--> blocks       ║
  ║  2. Replace content with industry-specific copy + data          ║
  ║  3. Copy each <div class="panel"> block into target operator    ║
  ║  4. Copy the <script> data constants, update for target         ║
  ║  5. Ensure typewriter utility is present in target file         ║
  ║  6. Wire sidebar nav items to show/hide the new panels          ║
  ╠══════════════════════════════════════════════════════════════════╣
  ║  SWAP ZONE GUIDE                                                ║
  ║  [SWAP: ACCENT_COLOR]    Brand hex (e.g. #E8A020 for amber)     ║
  ║  [SWAP: BRAND_NAME]      Business or simulator name             ║
  ║  [SWAP: LOCATION]        City, Province                         ║
  ║  [SWAP: CONTENT_TYPES]   Marketing button labels + IDs          ║
  ║  [SWAP: MARKETING_*]     Marketing copy per content type        ║
  ║  [SWAP: AI_QUERIES]      AI Console query button labels + IDs   ║
  ║  [SWAP: AI_*]            AI analysis copy per query type        ║
  ║  [SWAP: KPI_TILES]       KPI tile labels, values, colors        ║
  ║  [SWAP: CHART_LEFT]      Left bar chart title + data            ║
  ║  [SWAP: CHART_RIGHT]     Right bar chart title + data           ║
  ╚══════════════════════════════════════════════════════════════════╝
  -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    /* ── RESET ── */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

    /* ── THEME ──
       [SWAP: ACCENT_COLOR]
       --accent and --accent-dim are the only vars that need to change
       per simulator. All others are shared across the standard.     */
    :root{
      --bg:    #070709;
      --surface:#0D0D12;
      --elev:  #14141A;
      --hover: #1C1C26;
      --border:rgba(255,255,255,0.07);
      --border2:rgba(255,255,255,0.16);
      --text:  #F0F0F5;
      --text2: rgba(240,240,245,0.62);
      --text3: rgba(240,240,245,0.35);
      /* SWAP: replace with simulator brand color */
      --accent:#3B82F6;
      --accent-dim:rgba(59,130,246,0.12);
      /* Semantic — do not swap */
      --green: #10B981;
      --amber: #F59E0B;
      --red:   #EF4444;
      --mono:  'JetBrains Mono',monospace;
    }

    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px;}

    /* ── LAYOUT ── */
    .wrap{display:flex;height:100vh;overflow:hidden;}
    .sidebar{width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:20px 12px;overflow-y:auto;}
    .main{flex:1;overflow-y:auto;padding:32px 36px;}

    /* ── SIDEBAR ── */
    .sidebar-brand{padding:0 8px 20px;border-bottom:1px solid var(--border);margin-bottom:16px;}
    .sidebar-brand-label{font-size:0.55rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--text3);font-family:var(--mono);}
    .sidebar-brand-name{font-size:0.88rem;font-weight:700;color:var(--text);margin-top:4px;}
    .sidebar-section{font-family:var(--mono);font-size:0.55rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--text3);padding:0 8px 8px;margin-top:8px;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;cursor:pointer;font-size:0.82rem;color:var(--text2);transition:background 0.15s,color 0.15s;user-select:none;margin-bottom:2px;border-left:2px solid transparent;}
    .nav-item:hover{background:var(--hover);color:var(--text);}
    .nav-item.active{background:var(--accent-dim);color:var(--accent);font-weight:600;border-left-color:var(--accent);}
    .nav-icon{font-size:1rem;width:18px;text-align:center;flex-shrink:0;}

    /* ── PANEL ── */
    .panel{display:none;}
    .panel.active{display:block;}
    .panel-label{font-size:0.65rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);display:block;margin-bottom:6px;}
    .panel-title{font-size:1.5rem;font-weight:700;margin-bottom:6px;}
    .panel-sub{font-size:0.85rem;color:var(--text2);margin-bottom:24px;line-height:1.5;}

    /* ── CARDS + METRICS ── */
    .card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:20px 24px;margin-bottom:14px;}
    .metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
    .metric{background:var(--elev);border-radius:10px;padding:16px 20px;}
    .metric-label{font-size:0.65rem;color:var(--text3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;font-family:var(--mono);}
    .metric-value{font-size:1.5rem;font-weight:700;}

    /* ── BUTTONS ── */
    .btn-grid{display:grid;gap:10px;margin-bottom:20px;}
    .btn-grid-2{grid-template-columns:repeat(2,1fr);}
    .btn-grid-3{grid-template-columns:repeat(3,1fr);}
    .action-btn{background:transparent;color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:12px 16px;font-size:0.82rem;font-weight:600;cursor:pointer;text-align:left;transition:background 0.15s,color 0.15s,border-color 0.15s;font-family:'Inter',sans-serif;line-height:1.3;}
    .action-btn:hover{background:var(--hover);border-color:var(--accent);}
    .action-btn.active{background:var(--accent-dim);color:var(--accent);border-color:var(--accent);}

    /* ── OUTPUT BLOCK ── */
    .output-block{background:#050507;border:1px solid var(--border);border-radius:10px;padding:20px 24px;}
    .output-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
    .output-badge{background:var(--accent-dim);color:var(--accent);font-size:0.6rem;font-weight:700;letter-spacing:0.1em;padding:3px 8px;border-radius:4px;font-family:var(--mono);}
    .output-status{font-size:0.7rem;color:var(--text3);}
    .output-pre{font-size:0.82rem;color:var(--text2);white-space:pre-wrap;line-height:1.8;font-family:'Inter',sans-serif;min-height:24px;}

    /* ── BAR CHARTS ── */
    .chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .chart-title{font-size:0.82rem;font-weight:600;margin-bottom:16px;color:var(--text);}
    .bar-row{margin-bottom:10px;}
    .bar-header{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text2);margin-bottom:4px;}
    .bar-track{height:3px;background:var(--elev);border-radius:2px;}
    .bar-fill{height:100%;border-radius:2px;transition:width 0.7s ease;}

    /* ── TEMPLATE NOTICE BANNER ──
       Visible in template mode to guide implementers.
       Remove these divs when porting to production.        */
    .swap-notice{background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.18);border-radius:8px;padding:10px 16px;font-size:0.72rem;color:rgba(245,158,11,0.65);font-family:var(--mono);letter-spacing:0.04em;margin-bottom:24px;line-height:1.6;}
    .swap-notice strong{color:rgba(245,158,11,0.9);}

    /* ── RESPONSIVE ── */
    @media(max-width:768px){
      .wrap{flex-direction:column;}
      .sidebar{width:100%;height:auto;padding:10px 8px;border-right:none;border-bottom:1px solid var(--border);display:flex;gap:4px;overflow-x:auto;}
      .sidebar-brand,.sidebar-section{display:none;}
      .main{padding:20px 16px;}
      .metric-grid{grid-template-columns:repeat(2,1fr);}
      .btn-grid-2,.btn-grid-3{grid-template-columns:1fr 1fr;}
      .chart-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- ══════════════════════════════════════════════════════
       SIDEBAR
       Add Marketing / AI Console / Intelligence nav items
       to the sidebar of the target operator.html.
       Match data-panel IDs to the panel divs below.
  ══════════════════════════════════════════════════════ -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <!--[SWAP: BRAND_NAME] -->
      <div class="sidebar-brand-label">Aurora Digital Foundry</div>
      <div class="sidebar-brand-name">Operator Panel Standard</div>
      <!--[/SWAP]-->
    </div>

    <div class="sidebar-section">Intelligence</div>
    <div class="nav-item active" data-panel="marketing" onclick="showPanel('marketing',this)">
      <span class="nav-icon">📣</span> Marketing
    </div>
    <div class="nav-item" data-panel="ai" onclick="showPanel('ai',this)">
      <span class="nav-icon">🤖</span> AI Console
    </div>
    <div class="nav-item" data-panel="intelligence" onclick="showPanel('intelligence',this)">
      <span class="nav-icon">📊</span> Intelligence
    </div>
  </nav>

  <!-- ══════════════════════════════════════════════════════
       MAIN
  ══════════════════════════════════════════════════════ -->
  <main class="main">


    <!-- ╔═════════════════════════════════════════════════╗
         ║  PANEL 1 — MARKETING GENERATOR                 ║
         ╚═════════════════════════════════════════════════╝ -->
    <div id="panel-marketing" class="panel active">

      <div class="swap-notice">
        <strong>⚙ SWAP ZONES IN THIS PANEL:</strong><br>
        1. BRAND_NAME — business name in panel subtitle<br>
        2. CONTENT_TYPES — button labels + onclick keys (must match MARKETING_OUTPUTS keys in &lt;script&gt;)<br>
        3. MARKETING_OUTPUTS — copy for each content type (facebook / instagram / campaign / sms or custom keys)<br>
        <strong>Remove this notice div before shipping.</strong>
      </div>

      <span class="panel-label">Content</span>
      <h2 class="panel-title">Marketing Generator</h2>
      <!--[SWAP: BRAND_NAME] — replace business name in subtitle -->
      <p class="panel-sub">Generate ready-to-publish content for your business's social media and outreach campaigns.</p>
      <!--[/SWAP]-->

      <!--[SWAP: CONTENT_TYPES]
          Each button onclick value must match a key in MARKETING_OUTPUTS below.
          Adapt labels to industry. Examples:
            Gym:         Facebook Post | Instagram Caption | Full Campaign | SMS Campaign
            Surf camp:   Facebook Promo | Instagram Reel | Seasonal Package | WhatsApp Blast
            Contractor:  Facebook Post | Review Request | Job Announcement | SMS Follow-up
            Fuel dist.:  Price Update | Bulk Buyer Promo | Branch Announcement | Delivery Campaign
      -->
      <div class="btn-grid btn-grid-2" id="mktg-btns">
        <button class="action-btn" onclick="generateContent('facebook')">📘 Facebook Post</button>
        <button class="action-btn" onclick="generateContent('instagram')">📷 Instagram Caption</button>
        <button class="action-btn" onclick="generateContent('campaign')">📅 Full Campaign</button>
        <button class="action-btn" onclick="generateContent('sms')">💬 SMS Campaign</button>
      </div>
      <!--[/SWAP]-->

      <div id="mktg-output" style="display:none;" class="output-block">
        <div class="output-header">
          <span class="output-badge" id="mktg-badge">TYPE</span>
          <span class="output-status" id="mktg-status">Generating...</span>
        </div>
        <pre class="output-pre" id="mktg-text"></pre>
      </div>
    </div>


    <!-- ╔═════════════════════════════════════════════════╗
         ║  PANEL 2 — AI CONSOLE                          ║
         ╚═════════════════════════════════════════════════╝ -->
    <div id="panel-ai" class="panel">

      <div class="swap-notice">
        <strong>⚙ SWAP ZONES IN THIS PANEL:</strong><br>
        1. BRAND_NAME — business name in panel subtitle<br>
        2. AI_QUERIES — 3 query button labels + onclick keys (must match AI_OUTPUTS keys in &lt;script&gt;)<br>
        3. AI_OUTPUTS — analysis copy per query type (retention / revenue / leads or custom keys)<br>
        Query types should reflect the 3 most valuable analysis areas for this industry.<br>
        <strong>Remove this notice div before shipping.</strong>
      </div>

      <span class="panel-label">Intelligence</span>
      <h2 class="panel-title">AI Console</h2>
      <!--[SWAP: BRAND_NAME] — replace in subtitle below -->
      <p class="panel-sub">Run AI-powered analysis on your business data. Select a query to generate actionable insights.</p>
      <!--[/SWAP]-->

      <!--[SWAP: AI_QUERIES]
          3 queries matching the most valuable analysis types for this industry.
          Each onclick key must match a key in AI_OUTPUTS below. Examples:
            Gym:         retention / revenue / leads
            Surf camp:   occupancy / revenue / bookings
            Contractor:  pipeline / revenue / leads
            Fuel dist.:  delivery / revenue / inquiries
      -->
      <div class="btn-grid btn-grid-3" id="ai-btns">
        <button class="action-btn" onclick="runAI('retention')">Retention Analysis</button>
        <button class="action-btn" onclick="runAI('revenue')">Revenue Intelligence</button>
        <button class="action-btn" onclick="runAI('leads')">Lead Intelligence</button>
      </div>
      <!--[/SWAP]-->

      <div id="ai-output" style="display:none;" class="output-block">
        <div class="output-header">
          <span class="output-badge">AI ANALYSIS</span>
          <span class="output-status" id="ai-status">Analyzing data...</span>
        </div>
        <pre class="output-pre" id="ai-text"></pre>
      </div>
    </div>


    <!-- ╔═════════════════════════════════════════════════╗
         ║  PANEL 3 — BUSINESS INTELLIGENCE               ║
         ╚═════════════════════════════════════════════════╝ -->
    <div id="panel-intelligence" class="panel">

      <div class="swap-notice">
        <strong>⚙ SWAP ZONES IN THIS PANEL:</strong><br>
        1. KPI_TILES — 6 tile definitions [label, value, color] in &lt;script&gt;<br>
        2. CHART_LEFT — title + data array (revenue by category) in &lt;script&gt;<br>
        3. CHART_RIGHT — title + data array (distribution %) in &lt;script&gt;<br>
        All data is defined in the &lt;script&gt; section — no HTML edits needed here beyond removing this notice.<br>
        <strong>Remove this notice div before shipping.</strong>
      </div>

      <span class="panel-label">Analytics</span>
      <h2 class="panel-title">Business Intelligence</h2>

      <!--[SWAP: KPI_TILES]
          Defined in <script> as KPI_DATA array.
          6 tiles, 2 rows of 3.
          Format per tile: ['Label', 'Value string', 'CSS color or var(--x)']
          Rename labels to match industry. Examples:
            Gym:        Revenue MTD / Target / Progress / Active Members / At-Risk / Conv. Rate
            Surf camp:  Revenue MTD / Target / Progress / Active Bookings / Pending / Occupancy %
            Contractor: Revenue MTD / Target / Progress / Active Jobs / Overdue Quotes / Close Rate
            Fuel dist.: Revenue MTD / Target / Progress / Active Orders / Pending Deliveries / Order Rate
      -->
      <div class="metric-grid" id="kpi-grid">
        <!-- Rendered by JS from KPI_DATA -->
      </div>
      <!--[/SWAP]-->

      <!--[SWAP: CHART_LEFT + CHART_RIGHT]
          Both charts defined in <script> as CHART_LEFT and CHART_RIGHT objects.
          CHART_LEFT uses absolute ₱ values → bar widths are relative to max value.
          CHART_RIGHT uses percentage values (0–100) → bar widths are direct.
          Examples:
            Gym left:    Revenue by Coach | Gym right:  Membership Plan Mix
            Surf left:   Revenue by Package | Surf right: Room Type Distribution
            Trades left: Revenue by Service | Trades right: Job Category Split
            Fuel left:   Revenue by Branch | Fuel right:  Product Mix
      -->
      <div class="chart-grid">
        <div class="card">
          <div class="chart-title" id="chart-left-title">Revenue by Category</div>
          <div id="chart-left"></div>
        </div>
        <div class="card">
          <div class="chart-title" id="chart-right-title">Distribution</div>
          <div id="chart-right"></div>
        </div>
      </div>
      <!--[/SWAP]-->

    </div>

  </main>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
//  ADF STANDARD PANEL DATA
//  ─────────────────────────────────────────────────────────────────────
//  Everything below this line is the swap target.
//  The functions below the data section are STANDARD — do not modify.
// ═══════════════════════════════════════════════════════════════════════

// ── [SWAP: ACCENT_COLOR] ───────────────────────────────────────────────
// Replace with simulator brand color.
//   IronCrest:  '#E8A020'  (amber)
//   Alon:       '#3BAAB5'  (ocean teal)
//   Solaris:    '#F5A623'  (fuel amber)
//   ForgeHaus:  '#EF4444'  (red)
const ACCENT = '#3B82F6';

// ── [SWAP: BRAND_NAME + LOCATION] ──────────────────────────────────────
const BRAND    = 'Your Business';
const LOCATION = 'Baler, Aurora Province';

// ── [SWAP: KPI_TILES] ──────────────────────────────────────────────────
// 6 tiles. Format: ['Label', 'Display value', 'color (var or hex)']
// Colors: var(--green) = on target | var(--amber) = caution
//         var(--red) = alert       | var(--text)  = neutral
const KPI_DATA = [
  ['Revenue MTD',  '₱87,500',  'var(--green)'],
  ['Target',       '₱100,000', 'var(--text2)'],
  ['Progress',     '87%',      'var(--amber)'],
  ['Active Units', '67',       'var(--text)' ],
  ['At-Risk',      '5',        'var(--red)'  ],
  ['Conv. Rate',   '73%',      'var(--green)'],
];

// ── [SWAP: CHART_LEFT] ─────────────────────────────────────────────────
// Revenue by category — uses ₱ values, bars are relative to max.
// Examples: by coach roster / by service type / by branch / by package
const CHART_LEFT = {
  title: 'Revenue by Category',
  data: [
    { label: 'Category A', value: 42000, color: ACCENT },
    { label: 'Category B', value: 28000, color: 'var(--amber)' },
    { label: 'Category C', value: 17500, color: 'var(--green)' },
  ]
};

// ── [SWAP: CHART_RIGHT] ────────────────────────────────────────────────
// Distribution breakdown — uses percentage values (0–100).
// Examples: membership plan mix / room type / job category / product mix
const CHART_RIGHT = {
  title: 'Distribution',
  data: [
    { label: 'Segment A', pct: 42, color: ACCENT },
    { label: 'Segment B', pct: 28, color: 'var(--amber)' },
    { label: 'Segment C', pct: 30, color: 'var(--green)' },
  ]
};

// ── [SWAP: MARKETING_OUTPUTS] ──────────────────────────────────────────
// Keys must match the onclick values in the Marketing Generator buttons.
// Write copy that references actual business context (BRAND, LOCATION, metrics).
// Use template literals with BRAND and LOCATION vars where appropriate.
const MARKETING_OUTPUTS = {
  facebook:
`FACEBOOK POST — ${BRAND} Update

[SWAP] Write a Facebook post for this business.
Structure:
  - Hook: A metric, a win, or a bold statement
  - Body: 3–4 bullet proof points
  - CTA: One clear call to action
  - Footer: Location + contact + hashtags

${LOCATION}

#YourBrand #YourCity #Industry`,

  instagram:
`INSTAGRAM CAPTION

[SWAP] Write an Instagram caption.
Structure:
  - Attention hook (first line must stop the scroll)
  - 2–3 supporting proof points
  - Soft CTA (link in bio / DM us / visit us)
  - 6–10 hashtags

#YourBrand #Location #Industry`,

  campaign:
`SOCIAL MEDIA CAMPAIGN — [Month] [Year]

CAMPAIGN: "[Name Your Campaign]"
Duration: [Start] – [End] · Platform: Facebook + Instagram

WEEK 1 — ANNOUNCE:
· Post 1 ([Day]): [Topic — announce the campaign or a key offer]
· Post 2 ([Day]): [Topic — social proof, review, or testimonial]

WEEK 2 — EDUCATE:
· Post 3 ([Day]): [Topic — educate on a key differentiator]
· Post 4 ([Day]): [Topic — behind the scenes or team spotlight]

WEEK 3 — CONVERT:
· Post 5 ([Day]): [Topic — urgency, limited slots, deadline offer]
· Post 6 ([Day]): [Topic — close — final CTA with friction removed]

[SWAP] Replace each topic line with specific, industry-relevant content.`,

  sms:
`SMS CAMPAIGN — [Month] Promo

Batch 1 — New Inquiries (same-day contact):
"Hi [Name]! [BRAND] here. Your inquiry is confirmed — we have a slot open this week. Reply YES to book. [Location]"

Batch 2 — At-Risk / Inactive:
"Hey [Name], [BRAND] here. [Relevant re-engagement hook]. Your slot is still open — come back anytime this week."

Batch 3 — Renewal / Upsell:
"Hi [Name]! Your [service/membership] with [BRAND] is up for renewal. Lock in the current rate — reply RENEW or visit us at [Location]."

[SWAP] Adapt batch copy to match actual offers, trigger conditions, and business tone.`,
};

// ── [SWAP: AI_OUTPUTS] ─────────────────────────────────────────────────
// Keys must match the onclick values in the AI Console buttons.
// Write outputs that reference actual KPIs and business context.
// Each output should include: current state → diagnosis → ranked actions → projected outcome.
const AI_OUTPUTS = {
  retention:
`RETENTION ANALYSIS — [Month] [Year]

Current retention rate: [X]% (Industry avg: [Y]%)

[SWAP] AT-RISK FLAGGED ([metric threshold]):
· [Record 1 Name] — [relevant metric] · Last activity: [date] · Assigned to: [person]
· [Record 2 Name] — [relevant metric] · Last activity: [date] · Assigned to: [person]

RECOMMENDED ACTIONS (priority order):
1. Immediate: Assigned [staff] send personal check-in messages today
2. Offer a complimentary [re-engagement incentive]
3. If no response in 48hrs, escalate to a direct call

RETENTION RISK BY [STAFF/CATEGORY]:
· [Category A]: [N] at-risk ([X]% of total)
· [Category B]: [N] at-risk ([X]% of total)

PROJECTED IMPACT:
If all at-risk records churn: -₱[amount]/month recurring
Cost of re-engagement: ~[time] staff time
ROI of intervention: High — act today.`,

  revenue:
`REVENUE INTELLIGENCE — [Month] [Year]

MTD REVENUE: ₱[amount]
TARGET:      ₱[amount]
GAP:         ₱[amount] ([N] days remaining)

TO CLOSE THE GAP:
· [N] new [product/service A], OR
· [N] new [product/service B], OR
· Mix: [combination]

CURRENT PIPELINE:
· [N] active leads/inquiries in system
· [N] [trials/assessments/demos] scheduled this week
· Historical [conversion metric]: [X]%

PROJECTED FROM PIPELINE: ~[N] conversions = ₱[range]
Gap after pipeline: ₱[amount]

RECOMMENDATION:
[SWAP] One specific action to close the remaining gap.
State the action, the expected yield, and the timeline.
Example: "Activate referral push — current [customers] + social.
One referral campaign historically generates [N] leads in 7 days."`,

  leads:
`LEAD INTELLIGENCE — Current Pipeline

TOTAL ACTIVE LEADS: [N]

HIGH PRIORITY — Contact today:

// ── Typewriter ──
function typeWriter(targetId, text, speed, onDone) {
  const el = document.getElementById(targetId);
  if (!el) return;
  el.textContent = '';
  let i = 0;
  const t = setInterval(() => {
    i++;
    el.textContent = text.slice(0, i);
    if (i >= text.length) { clearInterval(t); if (onDone) onDone(); }
  }, speed);
}

// ── Panel switching ──
function showPanel(name, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const panel = document.getElementById('panel-' + name);
  if (panel) panel.classList.add('active');
  if (el) el.classList.add('active');
}

// ── Marketing Generator ──
let mktgTimer = null;
function generateContent(type) {
  if (mktgTimer) clearInterval(mktgTimer);
  document.querySelectorAll('#mktg-btns .action-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`#mktg-btns .action-btn[onclick="generateContent('${type}')"]`);
  if (activeBtn) activeBtn.classList.add('active');
  const output = document.getElementById('mktg-output');
  output.style.display = 'block';
  document.getElementById('mktg-badge').textContent = type.toUpperCase();
  document.getElementById('mktg-status').textContent = 'Generating...';
  document.getElementById('mktg-text').textContent = '';
  typeWriter('mktg-text', MARKETING_OUTPUTS[type] || '[Output not defined for this type]', 5, () => {
    document.getElementById('mktg-status').textContent = 'Done';
  });
}

// ── AI Console ──
let aiTimer = null;
function runAI(type) {
  if (aiTimer) clearInterval(aiTimer);
  document.querySelectorAll('#ai-btns .action-btn').forEach(b => b.classList.remove('active'));
  const activeBtn = document.querySelector(`#ai-btns .action-btn[onclick="runAI('${type}')"]`);
  if (activeBtn) activeBtn.classList.add('active');
  const output = document.getElementById('ai-output');
  output.style.display = 'block';
  document.getElementById('ai-status').textContent = 'Analyzing data...';
  document.getElementById('ai-text').textContent = '';
  setTimeout(() => {
    typeWriter('ai-text', AI_OUTPUTS[type] || '[Output not defined for this type]', 7, () => {
      document.getElementById('ai-status').textContent = 'Analysis complete';
    });
  }, 500);
}

// ── KPI tiles ──
function renderKPI() {
  const grid = document.getElementById('kpi-grid');
  if (!grid) return;
  grid.innerHTML = KPI_DATA.map(([label, value, color]) => `
    <div class="metric">
      <div class="metric-label">${label}</div>
      <div class="metric-value" style="color:${color}">${value}</div>
    </div>`).join('');
}

// ── Bar charts ──
function renderChart(containerId, titleId, def, mode) {
  const titleEl = document.getElementById(titleId);
  const container = document.getElementById(containerId);
  if (!titleEl || !container) return;
  titleEl.textContent = def.title;
  const maxVal = mode === 'value' ? Math.max(...def.data.map(d => d.value)) : 100;
  container.innerHTML = def.data.map(row => {
    const pct  = mode === 'value' ? Math.round((row.value / maxVal) * 100) : row.pct;
    const disp = mode === 'value' ? `₱${row.value.toLocaleString()}` : `${row.pct}%`;
    return `
      <div class="bar-row">
        <div class="bar-header"><span>${row.label}</span><span>${disp}</span></div>
        <div class="bar-track">
          <div class="bar-fill" style="width:0%;background:${row.color}"
               data-width="${pct}"></div>
        </div>
      </div>`;
  }).join('');
  // Animate bars on next tick
  requestAnimationFrame(() => {
    container.querySelectorAll('.bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.width + '%';
    });
  });
}

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  // Apply accent color
  document.documentElement.style.setProperty('--accent', ACCENT);
  // Compute accent-dim as 12% opacity version
  const hex = ACCENT.replace('#','');
  const r=parseInt(hex.slice(0,2),16), g=parseInt(hex.slice(2,4),16), b=parseInt(hex.slice(4,6),16);
  document.documentElement.style.setProperty('--accent-dim', `rgba(${r},${g},${b},0.12)`);
  renderKPI();
  renderChart('chart-left',  'chart-left-title',  CHART_LEFT,  'value');
  renderChart('chart-right', 'chart-right-title', CHART_RIGHT, 'pct');
});
